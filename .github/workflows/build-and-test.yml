name: Build and Test

on:
  push:
    branches: [ main, vNext, develop ]
  pull_request:
    branches: [ main, vNext ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup NuGet
      uses: nuget/setup-nuget@v2
      with:
        nuget-version: 'latest'
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Restore NuGet packages
      run: nuget restore
      
    - name: Build solution
      run: msbuild /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
      
    - name: Run tests
      run: vstest.console.exe "Xrm.Json.Serialization.Tests\bin\Release\Xrm.Json.Serialization.Tests.dll" /TestAdapterPath:"packages\xunit.runner.visualstudio.2.5.3\build\net462" /Logger:console
      
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          Xrm.Json.Serialization\bin\Release\*.dll
          Xrm.Json.Serialization\bin\Release\*.pdb
